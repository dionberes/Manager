<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/icon.jpg">
    <link rel="stylesheet" href="frontend/style.css">
    <link rel="apple-touch-icon" href="assets/icon.jpg">
    <meta name="apple-mobile-web-app-title" content="Manager">
</head>
<body>
    <div class="container">
        <div class="sec" style="justify-content: center; padding-right: 35px;">
            <img src="assets/ico.png" alt="Icon">
            <h2>Manager</h2>
        </div>
        <div class="content">
            <div class="sec">
                <div class="input-group">
                    <section class="i-sec">
                        <h1>Startzeit</h1>
                        <input type="time" id="start-time">
                    </section>

                    <section class="i-sec">
                        <h1>Endzeit</h1>
                        <input type="time" id="end-time">
                    </section>
                </div>

            </div>
            <div class="result-sec">
                <h1>Gesamtzeit</h1>
                <div id="total-time">00:00</div>
                <div id="isOvertime">+00:00</div>
            </div>
            
        </div> 
    </div>

    <footer>
        <div class="footer-container">
            <p>v.1.0.1</p>
            
        </div>
    </footer>

    <script>
        const startTimeInput = document.getElementById('start-time');
        const endTimeInput = document.getElementById('end-time');
        const totalTimeDisplay = document.getElementById('total-time');
        const overtimeDisplay = document.getElementById('isOvertime');

        function calculateTime() {
            const start = startTimeInput.value;
            const end = endTimeInput.value;

            if (start && end) {
                const s = start.split(':');
                const e = end.split(':');

                let startMinutes = parseInt(s[0]) * 60 + parseInt(s[1]);
                let endMinutes = parseInt(e[0]) * 60 + parseInt(e[1]);

                if (endMinutes < startMinutes) {
                    endMinutes += 24 * 60;
                }

                const diff = endMinutes - startMinutes;
                const hours = Math.floor(diff / 60);
                const minutes = diff % 60;

                totalTimeDisplay.textContent = 
                    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')} h`;

                if (diff > 7 * 60) {
                    overtimeDisplay.style.color = 'red';
                    overtimeDisplay.textContent = `+${String(hours- 7).padStart(2, '0')}:${String(minutes ).padStart(2, '0')} `;
                } else {
                    overtimeDisplay.style.color = 'green';
                    overtimeDisplay.textContent = `${String(hours - 7 ).padStart(2, '0')}:${String(minutes ).padStart(2, '0')} `;
                }
            }
        }

        startTimeInput.addEventListener('input', calculateTime);
        endTimeInput.addEventListener('input', calculateTime);
    </script>
</body>
</html>
